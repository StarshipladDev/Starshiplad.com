<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Binary Calculator</title>
        <style>
        
    /*body has a width of 33%.
    res has a background-color of lightgray, a border that is solid, a height of 48px, and a font-size of 20px.
    btn0 and btn1 have a background-color of lightgreen and a color of brown.
    btnClr and btnEql have a background-color of darkgreen and a color of white.
    btnSum, btnSub, btnMul, and btnDiv have a background-color of black, a color of red.
    All the buttons in btns have a width of 25%, a height of 36px, a font-size of 18px, margin of 0px, and float value left.*/
            #res{
                background-color:lightgrey;
                border-style:solid;
                border-color:black;
                height:48px;
                font-size:20px;
                text-align:center;
            }
            .btn{
                width:23%;
                border-style:solid;
                border-width:1px;
                border-color:black;
                height:36px;
                font-size:18px;
                margin:0px;
                float:left;
            }
            .lime{
                background-color:lightgreen;
                color: brown;
            }
            
            .lime{
                background-color:darkgreen;
                color: white;
            }
            .dark{
                background-color:black;
                color: red;
            }
        </style>
    </head>
    <body>
       <!-- Display tile -->
       <div id="res">
                
       </div>
        <!-- COntains all function buttons -->
        <div id="btns">
            <!-- Top row of button -->
            <div class="row">
                
                <!-- 0 button -->
                <div id="btn0" class="btn line">
                0
                </div>
                <!-- 1 button -->
                <div id="btn1" class="btn line">
                1
                </div>
                 <!-- Equals button -->
                <div id="btnEql" class="btn green">
                =
                </div>
                <!-- Cancel button -->
                <div id="btnClr" class="btn green">
                C
                </div>
            </div>
            <!-- bottom row of buttons -->
            <div class="row">
                
                <!-- Plus button -->
                <div id="btnSum" class="btn dark">
                +
                </div>
                <!-- Minus button -->
                <div id="btnSub" class="btn dark">
                -
                </div>
                 <!-- Times button -->
                <div id="btnMul" class="btn dark">
                X
                </div>
                <!-- Divide button -->
                <div id="btnDiv" class="btn dark">
                /
                </div>
            </div>
        </div>
        <script src="Javascript.js"> </script>
    </body>
</html>
        <!--
             res     Contains the result of button presses.
    btns     A button container that displays all eight calculator buttons.
0     btn0     A button expressing binary digit
.
1     btn1     A button expressing binary digit
.
C     btnClr     A button to clear the contents of
.
=     btnEql     A button to evaluate the contents of the expression in
.
+     btnSum     A button for the addition operation.
-     btnSub     A button for the subtraction operation.
*     btnMul     A button for the multiplication operation.
/     btnDiv     A button for the integer division operation.
-->
